run:
  timeout: 5m
  tests: true

linters:
  enable:
    - gofmt
    - goimports
    - staticcheck
    - gosimple
    - ineffassign
    - unused
    - typecheck

  disable:
    - gocyclo      # Complexity checks - POC code prioritizes clarity
    - lll          # Line length - Go convention is flexible
    - funlen       # Function length - some implementations need to be long
    - gocognit     # Cognitive complexity - defer to code review
    - errcheck     # POC phase - will enable post-v1
    - gosec        # Security checks - will enable post-v1
    - govet        # Shadow and fieldalignment - will address post-v1

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  govet:
    enable-all: true

  staticcheck:
    checks: ["all"]

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0

  # Relax rules for test code during POC phase
  exclude-rules:
    - path: _test\.go$
      linters:
        - errcheck
        - gosec
        - govet
    - path: ^test/
      linters:
        - errcheck
        - gosec
        - govet
