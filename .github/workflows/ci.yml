name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test
    strategy:
      matrix:
        # Windows tests disabled during POC phase due to file locking differences
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download dependencies
        run: go mod download

      - name: Build test binary
        run: go build -o rgt ./cmd/rgt

      - name: Run tests
        run: go test ./...

      - name: Run tests with race detector
        run: go test -race ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binary
        run: go build -o rgt ./cmd/rgt

      - name: Test binary
        run: ./rgt version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rgt-linux-amd64
          path: rgt
