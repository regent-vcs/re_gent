name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Help us understand what you need and why.

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: Clear description of the feature you'd like to see
      placeholder: "I'd like Regent to..."
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: What agent workflow or problem does this enable or solve?
      placeholder: "This would help with... When an agent does X, I need to..."
    validations:
      required: true

  - type: dropdown
    id: phase
    attributes:
      label: Related Phase
      description: Is this related to a POC phase from POC.md?
      options:
        - "None / Not in current roadmap"
        - "Phase 2: Hook Integration"
        - "Phase 3: Blame Algorithm"
        - "Phase 4: Transcript Staging"
        - "Phase 5: Rewind"
        - "Phase 6: Concurrency Hardening"
        - "Future / Post-POC"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative approaches or workarounds?
      placeholder: "I tried... but it doesn't work because..."

  - type: checkboxes
    id: willing
    attributes:
      label: Implementation
      options:
        - label: I'm willing to implement this feature and submit a PR

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, examples, or references
