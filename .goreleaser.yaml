version: 2

before:
  hooks:
    - go mod tidy
    - go test ./...
    - mkdir -p completions
    - sh -c "go run ./cmd/rgt completion bash > completions/rgt.bash"
    - sh -c "go run ./cmd/rgt completion zsh > completions/_rgt"
    - sh -c "go run ./cmd/rgt completion fish > completions/rgt.fish"

builds:
  - id: rgt
    main: ./cmd/rgt
    binary: rgt
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - completions/*

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

release:
  github:
    owner: regent-vcs
    name: re_gent
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} v{{.Version}}"

# Homebrew tap for easy installation
brews:
  - name: regent
    repository:
      owner: regent-vcs
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: regent-bot
      email: bot@regent-vcs.dev
    homepage: "https://github.com/regent-vcs/re_gent"
    description: "Git for AI agents - content-addressed version control for agent activity"
    license: "Apache-2.0"
    install: |
      bin.install "rgt"
      # Generate shell completions
      bash_completion.install "completions/rgt.bash" => "rgt"
      zsh_completion.install "completions/_rgt" => "_rgt"
      fish_completion.install "completions/rgt.fish" => "rgt.fish"
    test: |
      system "#{bin}/rgt", "version"
